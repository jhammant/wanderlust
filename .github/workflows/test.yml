name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install .[dev]
          # Install click for CLI testing
          pip install click rich geopy scikit-learn pandas folium openai flask

      - name: Run tests with coverage
        run: |
          python3 -m pip install --upgrade pip pytest-cov
          python3 -m pytest tests/ -v --tb=short --cov=wanderlust --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Run linter (flake8)
        run: |
          pip install flake8
          flake8 src/ tests/ --count --show-source --statistics

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run flake8
        run: |
          flake8 src/ tests/ --count --show-source --statistics

      - name: Run isort
        run: |
          isort src/ tests/ --check-only

      - name: Run black
        run: |
          black src/ tests/ --check

      - name: Run mypy
        run: |
          pip install types-requests
          mypy src/ --ignore-missing-imports
